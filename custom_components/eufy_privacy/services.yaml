set_privacy_mode:
  name: Set Privacy Mode
  description: Enable or disable privacy mode on a Eufy camera.
  fields:
    serial:
      name: Serial Number
      description: Camera serial number (e.g. T8410P1234567).
      required: true
      example: T8410P1234567
      selector:
        text:
    enabled:
      name: Privacy Enabled
      description: true = privacy on (camera off), false = privacy off (camera running).
      required: true
      example: true
      selector:
        boolean:
